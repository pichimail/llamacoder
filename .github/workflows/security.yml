name: Security & Quality

on:
  push:
    branches: [main, production-hardening]
  pull_request:
    branches: [main, production-hardening]

jobs:
  security:
    runs-on: ubuntu-latest
    name: Security Checks
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run TypeScript type check
        run: pnpm tsc --noEmit
      
      - name: Run ESLint
        run: pnpm lint
        continue-on-error: true
      
      - name: Check for hardcoded secrets
        run: |
          if grep -r "TOGETHER_API_KEY\|OPENROUTER_API_KEY\|GOOGLE_CLIENT_SECRET\|DATABASE_URL" --include="*.ts" --include="*.tsx" --include="*.js" src/ app/ lib/ --exclude="*.example.*" --exclude="*.env*" 2>/dev/null | grep -v "process.env\|getenv\|import"; then
            echo "WARNING: Possible hardcoded secrets found"
            exit 1
          fi
      
      - name: Build project
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: 1

  auth-tests:
    runs-on: ubuntu-latest
    name: Authorization Tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Verify authz helpers exist
        run: |
          test -f lib/authz.ts || (echo "lib/authz.ts not found" && exit 1)
          grep -q "requireCurrentUser\|requireChatAccess\|requireProjectAccess\|requireAdmin" lib/authz.ts || exit 1
      
      - name: Verify API routes have auth checks
        run: |
          # Check create-chat has auth
          grep -q "getCurrentUserOrNull\|AuthError" app/api/create-chat/route.ts || exit 1
          
          # Check blob-upload has auth
          grep -q "getCurrentUserOrNull\|ALLOWED_MIME_TYPES" app/api/blob-upload/route.ts || exit 1
          
          # Check workspace has access checks
          grep -q "requireChatAccess" app/api/workspace/\[chatId\]/route.ts || exit 1

  prisma:
    runs-on: ubuntu-latest
    name: Prisma Schema Validation
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Validate Prisma schema
        run: pnpm prisma validate
      
      - name: Generate Prisma client
        run: pnpm prisma generate
      
      - name: Check for new models (FileUpload, RateLimit, etc)
        run: |
          grep -q "model FileUpload" prisma/schema.prisma || (echo "FileUpload model missing" && exit 1)
          grep -q "model RateLimit" prisma/schema.prisma || (echo "RateLimit model missing" && exit 1)
          grep -q "fileUploads.*FileUpload\[\]" prisma/schema.prisma || exit 1
